<body class="vfv_scroll">
    <!-- EstreUI 다크모드 설정에 따름 — 저장된 사용자 설정 우선, 없으면 OS(prefers-color-scheme).
         라이트/다크 깜빡임(FOUC) 방지 위해 사전 페인트에서 적용. localStorage 는 쓰지 않음(auto 상태 보존 →
         오버워치 패널의 다크모드 토글 auto→light→dark 순환이 그대로 동작). estreUi-main.js applyDarkMode() 와 동일 로직. -->
    <script>
        (function () {
            try {
                var pref = localStorage.getItem("estreUi.darkMode");   // "1"=다크 / "0"=라이트 / null=auto(OS)
                var isDark = pref === "1" ? true
                           : pref === "0" ? false
                           : !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
                if (isDark) document.body.dataset.darkMode = "1";
                else delete document.body.dataset.darkMode;
            } catch (e) { /* localStorage 불가 환경: EstreUI 가 init 시 재적용 */ }
        })();
    </script>
