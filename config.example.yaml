# LTNC hub 설정 예시 — 복사해서 config.yaml 로 (config.yaml 은 gitignore, chmod 600 권장)
port: 8420
bind: 127.0.0.1          # 외부 노출은 reverse-proxy(httpd/nginx) 뒤에서. 직접 노출 시 보안 주의
dataDir: ./data          # SQLite·아카이브 위치
agents:                  # 피감시 서버 등록 — token 은 충분히 긴 무작위값으로
  - id: example-web
    token: CHANGE_ME_random_32+
    tags: web,prod
retention:
  rawDays: 14
  agg5mDays: 90
  agg1hDays: 1095

# ── M2: 간단 인증 게이트 (미설정 시 보호 비활성 — 기존처럼 공개, 기동 로그에 경고만) ──
# passHash 생성: node packages/hub/src/auth.mjs <비밀번호>
#auth:
#  user: admin
#  passHash: scrypt$16384$8$1$<salt-hex>$<key-hex>
#  sessionTtlSec: 2592000        # 세션 유지 시간(초, 기본 30일). 활동 시 자동 연장(sliding) + data/sessions.json 영속화(재기동에도 로그인 유지)
#  home: stats                   # (선택) 로그인 직후 이동할 루트탭 id — 예: 통계 탭 직행
#  users:                        # (선택) 추가 계정 — 각자 passHash, 계정별 home 지정 가능
#    - user: viewer
#      passHash: scrypt$16384$8$1$<salt-hex>$<key-hex>
#      home: stats

# ── M2: 알림 룰 — 기본 룰 내장(디스크 85/93·CPU 90·메모리 92·서비스/포트 다운·인증서 14일·복제지연·체크실패·offline)
# 동일 (server·metric·severity) 키는 덮어쓰기, 새 키는 추가. enabled: false 로 기본 룰 끄기.
#rules:
#  - { metric: 'disk.*.used_pct', op: '>=', threshold: 80, severity: warn }            # 기본 85 → 80 강화
#  - { metric: 'exec.queue_depth', op: '>', threshold: 100, forSec: 60, severity: warn, server: example-web }
#  - { metric: 'cpu.pct', severity: warn, enabled: false }                             # 기본 CPU warn 룰 비활성

