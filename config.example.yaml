# ── M2: 외부 HTTP 업타임 체크 — 가상 서버 '@checks' 메트릭(check.<id>.up / check.<id>.ms)으로 저장 ──
#checks:
#  - { id: www, url: https://www.example.com/, keyword: 환영, intervalSec: 60, timeoutSec: 10 }
